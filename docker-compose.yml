services:
  opensearch:
    image:  ${OSS_IMAGE:-opensearchproject/opensearch:2}
    hostname: opensearch
    container_name: opensearch
    networks:
      - opensearch # used by OpenSearch Dashboard
    environment:
      - cluster.name=opensearch
      - bootstrap.memory_lock=true
      - discovery.type=single-node
      - path.repo=/tmp
      - network.publish_host=127.0.0.1
      - logger.org.opensearch=warn
      - "OPENSEARCH_JAVA_OPTS=-Xms3g -Xmx3g"
      - "OPENSEARCH_INITIAL_ADMIN_PASSWORD=myStrongPassword123@456"
      - "plugins.security.ssl.http.enabled=false"
      - "plugins.ml_commons.only_run_on_ml_node=false"
      - "plugins.ml_commons.native_memory_threshold=99"
      - "plugins.ml_commons.connector_access_control_enabled=true"
      - "plugins.ml_commons.trusted_connector_endpoints_regex=^https?://.*"
      - "plugins.ml_commons.model_access_control_enabled=true"
      - "plugins.ml_commons.allow_registering_model_via_url=true"
      - "cluster.blocks.create_index=false"
      - "cluster.blocks.read_only_allow_delete=false"
      - "cluster.routing.allocation.disk.threshold_enabled=false"
      - ${OSS_ENV_VAR:-FOO=bar}
    command: ${OS_COMMAND:-}
    ulimits:
      nproc: 65536
      nofile:
        soft: 65536
        hard: 65536
      memlock:
        soft: -1
        hard: -1
    ports:
      - 9200:9200
networks:
  opensearch:
    driver: bridge
